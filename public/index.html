<!DOCTYPE html>
<html>
<head>
<title>Budget Upload</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:5px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Budget Variance Upload</h2>

<div class="card">
<h3>Upload Budget CSV</h3>
<input type="file" id="budgetFile">
<br><br>
<button onclick="uploadBudget()">Upload</button>
<p id="budgetStatus"></p>
</div>

<div class="card">
<h3>Upload Actual CSV</h3>
<input type="file" id="actualFile">
<br><br>
<button onclick="uploadActual()">Upload</button>
<p id="actualStatus"></p>
</div>

<script>

async function uploadBudget(){

const file = document.getElementById("budgetFile").files[0];

const formData = new FormData();
formData.append("file", file);

await fetch("/upload-budget",{
method:"POST",
body:formData
});

document.getElementById("budgetStatus").innerText="Uploaded";

}

async function uploadActual(){

const file = document.getElementById("actualFile").files[0];

const formData = new FormData();
formData.append("file", file);

await fetch("/upload-actual",{
method:"POST",
body:formData
});

document.getElementById("actualStatus").innerText="Uploaded";

}

</script>

</body>
</html>
